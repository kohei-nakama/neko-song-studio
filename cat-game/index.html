<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ねこスナックラン | 猫ソングスタジオ</title>
    <style>
      :root {
        --ink: #202532;
        --muted: #657085;
        --paper: #fffaf0;
        --line: rgba(32, 37, 50, 0.14);
        --mint: #74d4bf;
        --coral: #f36f64;
        --sun: #f4bd4f;
        --blue: #4d7fd1;
        --plum: #69527b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
        background:
          radial-gradient(circle at 15% 8%, rgba(244, 189, 79, 0.45), transparent 32%),
          radial-gradient(circle at 84% 14%, rgba(116, 212, 191, 0.42), transparent 28%),
          linear-gradient(135deg, #f7e7c4 0%, #d8eef0 42%, #f2d0c3 100%);
        overflow-x: hidden;
      }

      button {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
        padding: clamp(8px, 1.4vw, 16px);
        display: grid;
        place-items: center;
      }

      .game-shell {
        width: min(1180px, calc((100vh - 235px) * 1.6), 100%);
        display: grid;
        gap: 12px;
      }

      .topbar,
      .meter-row {
        background: rgba(255, 250, 240, 0.86);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(32, 37, 50, 0.1);
        backdrop-filter: blur(14px);
      }

      .topbar {
        min-height: 82px;
        padding: 12px;
        display: grid;
        grid-template-columns: minmax(190px, 1fr) auto auto;
        align-items: center;
        gap: 14px;
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
        border-radius: 50%;
        background:
          radial-gradient(circle at 36% 42%, #202532 0 4px, transparent 5px),
          radial-gradient(circle at 64% 42%, #202532 0 4px, transparent 5px),
          radial-gradient(circle at 50% 58%, #f36f64 0 4px, transparent 5px),
          linear-gradient(145deg, #fff3d3, #f4bd4f);
        border: 2px solid rgba(32, 37, 50, 0.16);
        position: relative;
        box-shadow: inset 0 -6px 0 rgba(255, 255, 255, 0.34);
      }

      .brand-mark::before,
      .brand-mark::after {
        content: "";
        position: absolute;
        top: -6px;
        width: 18px;
        height: 18px;
        background: #f4bd4f;
        border: 2px solid rgba(32, 37, 50, 0.16);
        transform: rotate(45deg);
        z-index: -1;
      }

      .brand-mark::before {
        left: 6px;
      }

      .brand-mark::after {
        right: 6px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.1rem, 1.8vw, 1.65rem);
        line-height: 1.05;
        white-space: nowrap;
      }

      .brand p {
        color: var(--muted);
        font-size: 0.82rem;
        margin-top: 3px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 9px 14px;
        color: #fff;
        background: var(--ink);
        border-radius: 999px;
        text-decoration: none;
        font-weight: 900;
      }

      .stats {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .stat,
      .combo,
      .level {
        min-width: 80px;
        padding: 7px 10px;
        border: 1px solid rgba(32, 37, 50, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
        text-align: center;
      }

      .stat span,
      .combo span,
      .level span {
        display: block;
        color: var(--muted);
        font-size: 0.68rem;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .stat strong,
      .combo strong,
      .level strong {
        display: block;
        margin-top: 2px;
        font-size: 1.25rem;
        line-height: 1.1;
      }

      .hearts {
        min-width: 112px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid rgba(32, 37, 50, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
      }

      .hearts span {
        width: 18px;
        height: 18px;
        background: var(--coral);
        transform: rotate(45deg);
        border-radius: 4px 4px 1px 4px;
        position: relative;
        box-shadow: inset -2px -2px 0 rgba(32, 37, 50, 0.09);
      }

      .hearts span::before,
      .hearts span::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: inherit;
      }

      .hearts span::before {
        left: -8px;
        top: 0;
      }

      .hearts span::after {
        left: 0;
        top: -8px;
      }

      .hearts span.is-empty {
        opacity: 0.2;
        filter: grayscale(1);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .icon-button,
      .difficulty-button,
      .primary-button {
        border: 1px solid rgba(32, 37, 50, 0.16);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        cursor: pointer;
        transition: transform 150ms ease, background 150ms ease, border-color 150ms ease, opacity 150ms ease;
      }

      .icon-button:hover,
      .difficulty-button:hover,
      .primary-button:hover {
        transform: translateY(-1px);
        background: #fff;
      }

      .icon-button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        font-size: 1.2rem;
        font-weight: 900;
      }

      .meter-row {
        padding: 10px 12px;
        display: grid;
        grid-template-columns: auto minmax(160px, 1fr) auto;
        align-items: center;
        gap: 12px;
      }

      .power-meter {
        height: 16px;
        overflow: hidden;
        border: 1px solid rgba(32, 37, 50, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.52);
      }

      .power-meter span {
        display: block;
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--mint), var(--sun), var(--coral));
        border-radius: inherit;
        transition: width 120ms linear;
      }

      .stage-wrap {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(32, 37, 50, 0.18);
        border-radius: 8px;
        box-shadow: 0 22px 55px rgba(36, 30, 18, 0.22);
        background: #a7ddbf;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 10;
        display: block;
        touch-action: none;
        cursor: crosshair;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(32, 37, 50, 0.22);
      }

      .overlay.is-hidden {
        pointer-events: none;
        opacity: 0;
      }

      .panel {
        width: min(430px, 100%);
        padding: clamp(20px, 4vw, 30px);
        border: 1px solid rgba(32, 37, 50, 0.14);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.94);
        box-shadow: 0 18px 42px rgba(32, 37, 50, 0.24);
        text-align: center;
        backdrop-filter: blur(16px);
      }

      .panel h2 {
        font-size: clamp(1.55rem, 4.4vw, 2.45rem);
        line-height: 1.05;
        word-break: keep-all;
      }

      .panel p {
        color: var(--muted);
        margin-top: 8px;
      }

      .difficulty {
        margin: 22px auto 16px;
        padding: 4px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        border: 1px solid rgba(32, 37, 50, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.55);
      }

      .difficulty-button {
        min-height: 38px;
        border-radius: 6px;
        font-weight: 700;
      }

      .difficulty-button.is-selected {
        color: #fff;
        background: var(--plum);
        border-color: transparent;
      }

      .primary-button {
        width: 100%;
        min-height: 48px;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-weight: 800;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 760px) {
        .topbar {
          grid-template-columns: 1fr auto;
        }

        .stats {
          grid-column: 1 / -1;
          order: 3;
          width: 100%;
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .stat,
        .hearts {
          min-width: 0;
        }
      }

      @media (max-width: 560px) {
        .app-shell {
          padding: 8px;
          align-items: start;
        }

        .topbar {
          gap: 10px;
          padding: 10px;
        }

        .brand-mark {
          width: 40px;
          height: 40px;
        }

        .actions {
          gap: 5px;
        }

        .icon-button {
          width: 38px;
          height: 38px;
        }

        .stats {
          gap: 6px;
        }

        .stat,
        .combo,
        .level {
          padding: 6px 4px;
        }

        .stat strong,
        .combo strong,
        .level strong {
          font-size: 1.05rem;
        }

        .hearts {
          min-width: 0;
          height: 40px;
          gap: 4px;
        }

        .hearts span,
        .hearts span::before,
        .hearts span::after {
          width: 14px;
          height: 14px;
        }

        .hearts span::before {
          left: -6px;
        }

        .hearts span::after {
          top: -6px;
        }

        .meter-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .combo,
        .level {
          display: none;
        }

        .panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="game-shell" aria-label="ねこスナックラン">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1>ねこラン</h1>
              <p>Cat Snack Run</p>
            </div>
          </div>

          <div class="stats" aria-live="polite">
            <div class="stat">
              <span>Score</span>
              <strong id="scoreText">0</strong>
            </div>
            <div class="stat">
              <span>Best</span>
              <strong id="bestText">0</strong>
            </div>
            <div class="stat">
              <span>Time</span>
              <strong id="timeText">60</strong>
            </div>
            <div class="hearts" id="livesText" aria-label="ライフ 3">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>

          <div class="actions">
            <a class="back-link" href="../">HPへ戻る</a>
            <button class="icon-button" id="soundBtn" type="button" aria-label="音を切り替え">♪</button>
            <button class="icon-button" id="pauseBtn" type="button" aria-label="一時停止" disabled>Ⅱ</button>
            <button class="icon-button" id="restartBtn" type="button" aria-label="リスタート">↻</button>
          </div>
        </header>

        <div class="meter-row">
          <div class="combo">
            <span>Combo</span>
            <strong id="comboText">x1</strong>
          </div>
          <div class="power-meter" aria-label="やる気">
            <span id="powerFill"></span>
          </div>
          <div class="level">
            <span>Level</span>
            <strong id="levelText">1</strong>
          </div>
        </div>

        <div class="stage-wrap">
          <canvas id="gameCanvas" width="1000" height="625" aria-label="猫が魚を集めるゲーム"></canvas>

          <div class="overlay" id="overlay">
            <div class="panel">
              <h2 id="overlayTitle">ねこスナックラン</h2>
              <p id="overlayCopy">60秒チャレンジ</p>

              <div class="difficulty" role="group" aria-label="難易度">
                <button class="difficulty-button is-selected" type="button" data-mode="easy">Easy</button>
                <button class="difficulty-button" type="button" data-mode="normal">Normal</button>
                <button class="difficulty-button" type="button" data-mode="hard">Hard</button>
              </div>

              <button class="primary-button" id="startBtn" type="button">スタート</button>
            </div>
          </div>
        </div>

        <p class="sr-only" id="controlHelp">矢印キー、WASD、または画面のドラッグで猫を動かします。</p>
      </section>
    </main>

    <script>
      (function () {
        "use strict";

        const WORLD = { width: 1000, height: 625 };
        const MAX_DT = 0.033;
        const modes = {
          easy: { obstacles: 3, speed: 118, time: 70, lives: 4, spawnRate: 4 },
          normal: { obstacles: 4, speed: 145, time: 60, lives: 3, spawnRate: 5 },
          hard: { obstacles: 6, speed: 174, time: 55, lives: 3, spawnRate: 6 },
        };

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("scoreText");
        const bestText = document.getElementById("bestText");
        const timeText = document.getElementById("timeText");
        const livesText = document.getElementById("livesText");
        const comboText = document.getElementById("comboText");
        const levelText = document.getElementById("levelText");
        const powerFill = document.getElementById("powerFill");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlayTitle");
        const overlayCopy = document.getElementById("overlayCopy");
        const startBtn = document.getElementById("startBtn");
        const pauseBtn = document.getElementById("pauseBtn");
        const restartBtn = document.getElementById("restartBtn");
        const soundBtn = document.getElementById("soundBtn");
        const difficultyButtons = Array.from(document.querySelectorAll(".difficulty-button"));
        let audioContext = null;
        let muted = false;
        let selectedMode = "normal";
        let lastTime = performance.now();
        let rafId = 0;
        const input = { keys: new Set(), pointerTarget: null, pointerControl: false };
        const state = {
          phase: "ready",
          score: 0,
          best: readBest(),
          combo: 1,
          comboClock: 0,
          level: 1,
          lives: 3,
          timeLeft: 60,
          fishTimer: 0,
          yarnTimer: 8,
          cat: createCat(),
          fish: [],
          hazards: [],
          yarn: null,
          particles: [],
        };

        bestText.textContent = String(state.best);
        selectMode(selectedMode);
        resizeCanvas();
        resetWorld(false);
        requestAnimationFrame(loop);
        window.addEventListener("resize", resizeCanvas);

        startBtn.addEventListener("click", () => {
          if (state.phase === "ended" || state.phase === "ready") resetWorld(true);
          else if (state.phase === "paused") resumeGame();
        });

        pauseBtn.addEventListener("click", () => {
          if (state.phase === "playing") pauseGame();
          else if (state.phase === "paused") resumeGame();
        });

        restartBtn.addEventListener("click", () => resetWorld(true));
        soundBtn.addEventListener("click", () => {
          muted = !muted;
          soundBtn.style.opacity = muted ? "0.45" : "1";
        });

        difficultyButtons.forEach((button) => {
          button.addEventListener("click", () => selectMode(button.dataset.mode));
        });

        window.addEventListener("keydown", (event) => {
          const key = event.key.toLowerCase();
          if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " "].includes(key)) event.preventDefault();
          if (key === " " && state.phase === "playing") return pauseGame();
          if (key === " " && state.phase === "paused") return resumeGame();
          input.keys.add(key);
          if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(key)) input.pointerControl = false;
        });

        window.addEventListener("keyup", (event) => input.keys.delete(event.key.toLowerCase()));
        canvas.addEventListener("pointerdown", (event) => {
          canvas.setPointerCapture(event.pointerId);
          input.pointerControl = true;
          input.pointerTarget = canvasPoint(event);
          if (state.phase === "ready" || state.phase === "ended") resetWorld(true);
        });
        canvas.addEventListener("pointermove", (event) => {
          if (event.buttons || event.pointerType === "touch") {
            input.pointerControl = true;
            input.pointerTarget = canvasPoint(event);
          }
        });
        canvas.addEventListener("pointerup", (event) => {
          input.pointerTarget = canvasPoint(event);
        });

        function resizeCanvas() {
          const rect = canvas.getBoundingClientRect();
          const ratio = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
          canvas.width = Math.round(rect.width * ratio);
          canvas.height = Math.round(rect.height * ratio);
          draw();
        }

        function loop(now) {
          const dt = Math.min(MAX_DT, (now - lastTime) / 1000);
          lastTime = now;
          if (state.phase === "playing") update(dt);
          else idleMotion(dt);
          draw();
          rafId = requestAnimationFrame(loop);
        }

        function resetWorld(playNow) {
          const mode = modes[selectedMode];
          state.phase = playNow ? "playing" : "ready";
          state.score = 0;
          state.combo = 1;
          state.comboClock = 0;
          state.level = 1;
          state.lives = mode.lives;
          state.timeLeft = mode.time;
          state.fishTimer = 0;
          state.yarnTimer = 7;
          state.cat = createCat();
          state.fish = [];
          state.hazards = [];
          state.yarn = null;
          state.particles = [];
          input.pointerTarget = null;
          input.pointerControl = false;
          for (let index = 0; index < mode.spawnRate; index += 1) spawnFish(index < 1 ? "gold" : "fish");
          for (let index = 0; index < mode.obstacles; index += 1) spawnHazard(index);
          pauseBtn.disabled = !playNow;
          pauseBtn.setAttribute("aria-label", "一時停止");
          overlay.classList.toggle("is-hidden", playNow);
          overlayTitle.textContent = "ねこスナックラン";
          overlayCopy.textContent = `${mode.time}秒チャレンジ`;
          startBtn.textContent = "スタート";
          updateHud();
          draw();
          if (playNow) beep(540, 0.07, "triangle", 0.03);
        }

        function pauseGame() {
          state.phase = "paused";
          pauseBtn.setAttribute("aria-label", "再開");
          overlay.classList.remove("is-hidden");
          overlayTitle.textContent = "一時停止";
          overlayCopy.textContent = `Score ${state.score}`;
          startBtn.textContent = "再開";
        }

        function resumeGame() {
          state.phase = "playing";
          pauseBtn.setAttribute("aria-label", "一時停止");
          overlay.classList.add("is-hidden");
          lastTime = performance.now();
        }

        function endGame() {
          state.phase = "ended";
          pauseBtn.disabled = true;
          if (state.score > state.best) {
            state.best = state.score;
            writeBest(state.best);
          }
          overlay.classList.remove("is-hidden");
          overlayTitle.textContent = state.lives > 0 ? "まんぷく" : "おひるね";
          overlayCopy.textContent = `Score ${state.score} / Best ${state.best}`;
          startBtn.textContent = "もう一度";
          updateHud();
          beep(220, 0.12, "sawtooth", 0.025);
          setTimeout(() => beep(330, 0.12, "triangle", 0.025), 120);
        }

        function selectMode(modeName) {
          selectedMode = modes[modeName] ? modeName : "normal";
          difficultyButtons.forEach((button) => button.classList.toggle("is-selected", button.dataset.mode === selectedMode));
          if (state.phase === "ready") {
            state.timeLeft = modes[selectedMode].time;
            state.lives = modes[selectedMode].lives;
            overlayCopy.textContent = `${modes[selectedMode].time}秒チャレンジ`;
            updateHud();
          }
        }

        function update(dt) {
          state.timeLeft -= dt;
          if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            endGame();
            return;
          }
          state.level = Math.max(1, Math.floor(state.score / 12) + 1);
          state.comboClock = Math.max(0, state.comboClock - dt);
          if (state.comboClock === 0) state.combo = 1;
          state.fishTimer -= dt;
          state.yarnTimer -= dt;
          state.cat.invulnerable = Math.max(0, state.cat.invulnerable - dt);
          state.cat.power = Math.max(0, state.cat.power - dt);
          moveCat(dt);
          updateFish(dt);
          updateHazards(dt);
          updateYarn(dt);
          updateParticles(dt);
          keepDifficultyPressure();
          updateHud();
        }

        function idleMotion(dt) {
          updateFish(dt * 0.35);
          updateHazards(dt * 0.25);
          updateYarn(dt * 0.35);
          updateParticles(dt);
        }

        function moveCat(dt) {
          const cat = state.cat;
          const boost = cat.power > 0 ? 1.35 : 1;
          const speed = (285 + state.level * 9) * boost;
          let dx = 0;
          let dy = 0;
          if (input.keys.has("arrowleft") || input.keys.has("a")) dx -= 1;
          if (input.keys.has("arrowright") || input.keys.has("d")) dx += 1;
          if (input.keys.has("arrowup") || input.keys.has("w")) dy -= 1;
          if (input.keys.has("arrowdown") || input.keys.has("s")) dy += 1;
          if (input.pointerControl && input.pointerTarget) {
            const targetDx = input.pointerTarget.x - cat.x;
            const targetDy = input.pointerTarget.y - cat.y;
            const distanceToTarget = Math.hypot(targetDx, targetDy);
            if (distanceToTarget > 4) {
              dx = targetDx / distanceToTarget;
              dy = targetDy / distanceToTarget;
              const slow = Math.min(1, distanceToTarget / 100);
              dx *= slow;
              dy *= slow;
            }
          } else if (dx || dy) {
            const length = Math.hypot(dx, dy);
            dx /= length;
            dy /= length;
          }
          const desiredX = dx * speed;
          const desiredY = dy * speed;
          const easing = Math.min(1, dt * 8);
          cat.vx += (desiredX - cat.vx) * easing;
          cat.vy += (desiredY - cat.vy) * easing;
          cat.x += cat.vx * dt;
          cat.y += cat.vy * dt;
          cat.x = clamp(cat.x, cat.r + 12, WORLD.width - cat.r - 12);
          cat.y = clamp(cat.y, cat.r + 12, WORLD.height - cat.r - 12);
          cat.angle = Math.atan2(cat.vy, cat.vx || 1);
          cat.step += (Math.abs(cat.vx) + Math.abs(cat.vy)) * dt * 0.018;
          if (cat.power > 0 && Math.random() < dt * 18) {
            state.particles.push({
              x: cat.x - Math.cos(cat.angle) * 28,
              y: cat.y - Math.sin(cat.angle) * 28,
              vx: -cat.vx * 0.06 + random(-18, 18),
              vy: -cat.vy * 0.06 + random(-18, 18),
              life: 0.45,
              maxLife: 0.45,
              color: "#f4bd4f",
              size: random(3, 7),
            });
          }
        }

        function updateFish(dt) {
          for (let index = state.fish.length - 1; index >= 0; index -= 1) {
            const item = state.fish[index];
            item.wiggle += dt * item.wiggleSpeed;
            item.x += Math.sin(item.wiggle) * dt * 10;
            item.y += Math.cos(item.wiggle * 0.7) * dt * 8;
            if (distance(item, state.cat) < item.r + state.cat.r) collectFish(index);
          }
          if (state.fishTimer <= 0 && state.fish.length < modes[selectedMode].spawnRate + 2) {
            spawnFish(Math.random() < 0.14 ? "gold" : "fish");
            state.fishTimer = random(0.9, 1.45);
          }
        }

        function collectFish(index) {
          const item = state.fish[index];
          const base = item.kind === "gold" ? 8 : 3;
          state.combo = Math.min(9, state.combo + 1);
          state.comboClock = 2.2;
          state.score += base * state.combo;
          burst(item.x, item.y, item.kind === "gold" ? "#f4bd4f" : "#4d7fd1", item.kind === "gold" ? 18 : 12);
          state.fish.splice(index, 1);
          spawnFish(Math.random() < 0.18 ? "gold" : "fish");
          beep(item.kind === "gold" ? 820 : 660, 0.045, "sine", 0.025);
        }

        function updateHazards(dt) {
          const cat = state.cat;
          for (const hazard of state.hazards) {
            const pressure = 1 + state.level * 0.035;
            hazard.x += hazard.vx * dt * pressure;
            hazard.y += hazard.vy * dt * pressure;
            hazard.spin += dt * hazard.spinSpeed;
            if (hazard.x < hazard.r + 8 || hazard.x > WORLD.width - hazard.r - 8) {
              hazard.vx *= -1;
              hazard.x = clamp(hazard.x, hazard.r + 8, WORLD.width - hazard.r - 8);
            }
            if (hazard.y < hazard.r + 8 || hazard.y > WORLD.height - hazard.r - 8) {
              hazard.vy *= -1;
              hazard.y = clamp(hazard.y, hazard.r + 8, WORLD.height - hazard.r - 8);
            }
            if (cat.invulnerable <= 0 && distance(hazard, cat) < hazard.r + cat.r * 0.76) {
              state.lives -= 1;
              state.combo = 1;
              state.comboClock = 0;
              cat.invulnerable = 1.35;
              const push = Math.atan2(cat.y - hazard.y, cat.x - hazard.x);
              cat.vx = Math.cos(push) * 260;
              cat.vy = Math.sin(push) * 260;
              burst(cat.x, cat.y, "#f36f64", 20);
              beep(170, 0.09, "square", 0.035);
              if (state.lives <= 0) {
                state.lives = 0;
                endGame();
                return;
              }
            }
          }
        }

        function updateYarn(dt) {
          if (!state.yarn && state.yarnTimer <= 0) {
            spawnYarn();
            state.yarnTimer = random(9, 14);
          }
          if (!state.yarn) return;
          state.yarn.spin += dt * 4;
          state.yarn.y += Math.sin(state.yarn.spin) * dt * 8;
          state.yarn.life -= dt;
          if (distance(state.yarn, state.cat) < state.yarn.r + state.cat.r) {
            state.cat.power = 5;
            state.score += 12;
            burst(state.yarn.x, state.yarn.y, "#74d4bf", 26);
            state.yarn = null;
            beep(960, 0.08, "triangle", 0.03);
            return;
          }
          if (state.yarn.life <= 0) state.yarn = null;
        }

        function updateParticles(dt) {
          for (let index = state.particles.length - 1; index >= 0; index -= 1) {
            const particle = state.particles[index];
            particle.life -= dt;
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vy += 90 * dt;
            if (particle.life <= 0) state.particles.splice(index, 1);
          }
        }

        function keepDifficultyPressure() {
          const target = modes[selectedMode].obstacles + Math.floor(state.level / 2);
          if (state.hazards.length < Math.min(target, 10)) spawnHazard(state.hazards.length);
        }

        function spawnFish(kind) {
          const point = freePoint(54);
          state.fish.push({
            kind,
            x: point.x,
            y: point.y,
            r: kind === "gold" ? 20 : 17,
            wiggle: random(0, Math.PI * 2),
            wiggleSpeed: random(2, 4),
            flip: Math.random() < 0.5 ? -1 : 1,
          });
        }

        function spawnHazard(index) {
          const mode = modes[selectedMode];
          const point = freePoint(90);
          const angle = random(0, Math.PI * 2);
          const speed = mode.speed + random(-18, 28) + index * 2;
          state.hazards.push({
            x: point.x,
            y: point.y,
            r: random(21, 28),
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            spin: random(0, Math.PI * 2),
            spinSpeed: random(-3, 3),
            shade: Math.random() < 0.5 ? "#5fb06b" : "#57a7c7",
          });
        }

        function spawnYarn() {
          const point = freePoint(70);
          state.yarn = { x: point.x, y: point.y, r: 22, spin: 0, life: 7 };
        }

        function freePoint(margin) {
          for (let attempt = 0; attempt < 50; attempt += 1) {
            const point = { x: random(margin, WORLD.width - margin), y: random(margin, WORLD.height - margin) };
            if (distance(point, state.cat || { x: WORLD.width / 2, y: WORLD.height / 2 }) > 160) return point;
          }
          return { x: random(margin, WORLD.width - margin), y: random(margin, WORLD.height - margin) };
        }

        function burst(x, y, color, count) {
          for (let index = 0; index < count; index += 1) {
            const angle = random(0, Math.PI * 2);
            const speed = random(60, 190);
            const life = random(0.32, 0.76);
            state.particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life,
              maxLife: life,
              color,
              size: random(3, 8),
            });
          }
        }

        function draw() {
          ctx.save();
          ctx.setTransform(canvas.width / WORLD.width, 0, 0, canvas.height / WORLD.height, 0, 0);
          drawRoom();
          drawFishShadows();
          state.fish.forEach(drawFish);
          if (state.yarn) drawYarn(state.yarn);
          state.hazards.forEach(drawHazard);
          drawParticles();
          drawCat(state.cat);
          if (state.phase === "paused") drawSoftPause();
          ctx.restore();
        }

        function drawRoom() {
          const floor = ctx.createLinearGradient(0, 0, WORLD.width, WORLD.height);
          floor.addColorStop(0, "#cce9bf");
          floor.addColorStop(0.5, "#a5ddc6");
          floor.addColorStop(1, "#f3d4a5");
          ctx.fillStyle = floor;
          ctx.fillRect(0, 0, WORLD.width, WORLD.height);
          ctx.save();
          ctx.globalAlpha = 0.17;
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 2;
          for (let x = -120; x < WORLD.width + 120; x += 80) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x + 210, WORLD.height);
            ctx.stroke();
          }
          for (let y = 60; y < WORLD.height; y += 86) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(WORLD.width, y - 68);
            ctx.stroke();
          }
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = "#fffaf0";
          ctx.beginPath();
          ctx.ellipse(825, 95, 230, 58, -0.12, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(180, 548, 250, 58, 0.05, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          drawRug();
        }

        function drawRug() {
          ctx.save();
          ctx.translate(500, 330);
          ctx.rotate(-0.05);
          ctx.fillStyle = "rgba(105, 82, 123, 0.16)";
          roundedRect(-210, -96, 420, 192, 36);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 250, 240, 0.38)";
          ctx.lineWidth = 6;
          roundedRect(-185, -72, 370, 144, 28);
          ctx.stroke();
          ctx.restore();
        }

        function drawFishShadows() {
          ctx.save();
          ctx.globalAlpha = 0.14;
          ctx.fillStyle = "#202532";
          for (const item of state.fish) {
            ctx.beginPath();
            ctx.ellipse(item.x, item.y + item.r + 12, item.r * 0.9, item.r * 0.28, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          if (state.yarn) {
            ctx.beginPath();
            ctx.ellipse(state.yarn.x, state.yarn.y + 30, 22, 7, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        function drawFish(item) {
          ctx.save();
          ctx.translate(item.x, item.y);
          ctx.scale(item.flip, 1);
          ctx.rotate(Math.sin(item.wiggle) * 0.12);
          const body = item.kind === "gold" ? "#f4bd4f" : "#4d7fd1";
          const fin = item.kind === "gold" ? "#f36f64" : "#74d4bf";
          ctx.fillStyle = fin;
          ctx.beginPath();
          ctx.moveTo(-item.r * 0.72, 0);
          ctx.lineTo(-item.r * 1.35, -item.r * 0.6);
          ctx.lineTo(-item.r * 1.28, item.r * 0.62);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.ellipse(0, 0, item.r * 1.05, item.r * 0.65, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fffaf0";
          ctx.beginPath();
          ctx.arc(item.r * 0.45, -item.r * 0.16, item.r * 0.16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#202532";
          ctx.beginPath();
          ctx.arc(item.r * 0.49, -item.r * 0.16, item.r * 0.07, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawHazard(hazard) {
          ctx.save();
          ctx.translate(hazard.x, hazard.y);
          ctx.rotate(hazard.spin);
          ctx.fillStyle = "rgba(32, 37, 50, 0.13)";
          ctx.beginPath();
          ctx.ellipse(0, hazard.r + 17, hazard.r * 1.1, hazard.r * 0.36, 0, 0, Math.PI * 2);
          ctx.fill();
          if (hazard.shade === "#57a7c7") {
            ctx.fillStyle = "#57a7c7";
            ctx.beginPath();
            ctx.ellipse(0, 0, hazard.r * 1.14, hazard.r * 0.78, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.42)";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(-6, -3, hazard.r * 0.68, 0.1, Math.PI * 1.2);
            ctx.stroke();
          } else {
            ctx.fillStyle = "#5fb06b";
            roundedRect(-hazard.r * 1.15, -hazard.r * 0.48, hazard.r * 2.3, hazard.r * 0.96, hazard.r * 0.46);
            ctx.fill();
            ctx.fillStyle = "rgba(255,255,255,0.28)";
            for (let x = -hazard.r * 0.7; x <= hazard.r * 0.75; x += hazard.r * 0.45) {
              ctx.beginPath();
              ctx.ellipse(x, -hazard.r * 0.1, 3.5, 7, 0.2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
        }

        function drawYarn(yarn) {
          ctx.save();
          ctx.translate(yarn.x, yarn.y);
          ctx.rotate(yarn.spin);
          ctx.fillStyle = "#74d4bf";
          ctx.beginPath();
          ctx.arc(0, 0, yarn.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(32,37,50,0.27)";
          ctx.lineWidth = 3;
          for (let index = 0; index < 4; index += 1) {
            ctx.beginPath();
            ctx.ellipse(0, 0, yarn.r - 4, 5 + index * 2, (index * Math.PI) / 4, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.strokeStyle = "#f36f64";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(yarn.r * 0.55, yarn.r * 0.35);
          ctx.bezierCurveTo(46, 42, 54, 2, 82, 22);
          ctx.stroke();
          ctx.restore();
        }

        function drawCat(cat) {
          ctx.save();
          ctx.translate(cat.x, cat.y);
          const faceRight = Math.abs(cat.vx) > 8 ? Math.sign(cat.vx) : 1;
          ctx.scale(faceRight, 1);
          const blink = cat.invulnerable > 0 && Math.floor(cat.invulnerable * 14) % 2 === 0;
          if (blink) ctx.globalAlpha = 0.55;
          ctx.fillStyle = "rgba(32, 37, 50, 0.15)";
          ctx.beginPath();
          ctx.ellipse(0, 38, 43, 13, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#f6c85f";
          ctx.lineWidth = 16;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(-34, 2);
          ctx.bezierCurveTo(-66, -24, -72, 28, -48, 24);
          ctx.stroke();
          ctx.fillStyle = "#fff2d6";
          ctx.beginPath();
          ctx.ellipse(0, 10, 41, 31, 0.08, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#d5965c";
          ctx.beginPath();
          ctx.ellipse(-12, 4, 14, 22, -0.85, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff2d6";
          ctx.beginPath();
          ctx.arc(20, -16, 30, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#f6c85f";
          ctx.beginPath();
          ctx.moveTo(4, -38);
          ctx.lineTo(14, -69);
          ctx.lineTo(28, -37);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(34, -35);
          ctx.lineTo(54, -60);
          ctx.lineTo(55, -25);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#f1a7a1";
          ctx.beginPath();
          ctx.moveTo(13, -43);
          ctx.lineTo(16, -57);
          ctx.lineTo(23, -42);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(40, -37);
          ctx.lineTo(50, -49);
          ctx.lineTo(50, -31);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#d5965c";
          ctx.beginPath();
          ctx.ellipse(10, -24, 11, 16, -0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#202532";
          ctx.beginPath();
          ctx.arc(14, -18, 3.3, 0, Math.PI * 2);
          ctx.arc(36, -17, 3.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#f36f64";
          ctx.beginPath();
          ctx.moveTo(25, -10);
          ctx.lineTo(30, -8);
          ctx.lineTo(25, -5);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "#202532";
          ctx.lineWidth = 1.8;
          ctx.lineCap = "round";
          for (const side of [-1, 1]) {
            ctx.beginPath();
            ctx.moveTo(25, -6);
            ctx.quadraticCurveTo(36, -5 + side * 5, 49, -9 + side * 7);
            ctx.stroke();
          }
          const paw = Math.sin(cat.step) * 4;
          ctx.fillStyle = "#fff2d6";
          ctx.beginPath();
          ctx.ellipse(-18, 34 + paw, 10, 8, 0, 0, Math.PI * 2);
          ctx.ellipse(20, 34 - paw, 10, 8, 0, 0, Math.PI * 2);
          ctx.fill();
          if (cat.power > 0) {
            ctx.globalAlpha = 0.65;
            ctx.strokeStyle = "#74d4bf";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(5, 4, 55 + Math.sin(performance.now() / 90) * 4, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawParticles() {
          for (const particle of state.particles) {
            const alpha = Math.max(0, particle.life / particle.maxLife);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = particle.color;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        function drawSoftPause() {
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = "#202532";
          ctx.fillRect(0, 0, WORLD.width, WORLD.height);
          ctx.restore();
        }

        function updateHud() {
          scoreText.textContent = String(state.score);
          bestText.textContent = String(state.best);
          timeText.textContent = String(Math.ceil(state.timeLeft));
          comboText.textContent = `x${state.combo}`;
          levelText.textContent = String(state.level);
          livesText.setAttribute("aria-label", `ライフ ${state.lives}`);
          Array.from(livesText.children).forEach((heart, index) => heart.classList.toggle("is-empty", index >= state.lives));
          powerFill.style.width = `${Math.round((state.cat.power / 5) * 100)}%`;
        }

        function createCat() {
          return { x: WORLD.width / 2, y: WORLD.height / 2, r: 33, vx: 0, vy: 0, angle: 0, step: 0, invulnerable: 0, power: 0 };
        }

        function canvasPoint(event) {
          const rect = canvas.getBoundingClientRect();
          return { x: ((event.clientX - rect.left) / rect.width) * WORLD.width, y: ((event.clientY - rect.top) / rect.height) * WORLD.height };
        }

        function distance(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function random(min, max) {
          return Math.random() * (max - min) + min;
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function roundedRect(x, y, width, height, radius) {
          const r = Math.min(radius, width / 2, height / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + width, y, x + width, y + height, r);
          ctx.arcTo(x + width, y + height, x, y + height, r);
          ctx.arcTo(x, y + height, x, y, r);
          ctx.arcTo(x, y, x + width, y, r);
          ctx.closePath();
        }

        function beep(frequency, duration, type, gainValue) {
          if (muted) return;
          try {
            audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            gain.gain.value = gainValue;
            gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + duration);
          } catch (error) {
            muted = true;
            soundBtn.style.opacity = "0.45";
          }
        }

        function readBest() {
          try {
            return Number(localStorage.getItem("cat-snack-run-best") || 0);
          } catch (error) {
            return 0;
          }
        }

        function writeBest(value) {
          try {
            localStorage.setItem("cat-snack-run-best", String(value));
          } catch (error) {
            // Best score is optional, so storage failures do not affect play.
          }
        }

        window.addEventListener("beforeunload", () => cancelAnimationFrame(rafId));
      })();
    </script>
  </body>
</html>
