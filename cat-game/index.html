<body>
<main class='app'><section class='game' aria-label='ねこスナックラン'>
<header class='top'><div class='brand'><span class='mark' aria-hidden='true'></span><div><h1>ねこラン</h1><p>Cat Snack Run</p></div></div><div class='stats' aria-live='polite'><div class='stat'><span>Score</span><strong id='score'>0</strong></div><div class='stat'><span>Best</span><strong id='best'>0</strong></div><div class='stat'><span>Time</span><strong id='time'>60</strong></div><div class='life' id='life' aria-label='ライフ 3'><span></span><span></span><span></span><span></span></div></div><div class='actions'><a class='back' href='../'>HPへ戻る</a><button class='icon' id='sound' type='button' aria-label='音を切り替え'>♪</button><button class='icon' id='pause' type='button' aria-label='一時停止' disabled>Ⅱ</button><button class='icon' id='restart' type='button' aria-label='リスタート'>↻</button></div></header>
<div class='meter'><div class='combo'><span>Combo</span><strong id='combo'>x1</strong></div><div class='bar' aria-label='やる気'><span id='power'></span></div><div class='level'><span>Level</span><strong id='level'>1</strong></div></div>
<div class='stage'><canvas id='canvas' width='1000' height='625' aria-label='猫が魚を集めるゲーム'></canvas><div class='overlay' id='overlay'><div class='panel'><h2 id='title'>ねこスナックラン</h2><p id='copy'>60秒チャレンジ</p><ol class='history' id='history' aria-label='上位スコア' hidden></ol><div class='modes' role='group' aria-label='難易度'><button class='mode on' type='button' data-mode='easy'>Easy</button><button class='mode' type='button' data-mode='normal'>Normal</button><button class='mode' type='button' data-mode='hard'>Hard</button></div><button class='primary' id='start' type='button'>スタート</button></div></div><div class='padbox' aria-label='操作キー'><button class='pad' type='button' data-dir='up' aria-label='上'>▲</button><button class='pad' type='button' data-dir='left' aria-label='左'>◀</button><button class='pad' type='button' data-dir='right' aria-label='右'>▶</button><button class='pad' type='button' data-dir='down' aria-label='下'>▼</button></div></div>
<p class='sr'>矢印キー、WASD、画面下の操作キー、または画面のドラッグで猫を動かします。</p>
</section></main>
<script>
(()=>{'use strict';
const W=1000,H=625,MAX=.033,KB='cat-snack-run-best',KS='cat-snack-run-scores',modes={easy:{time:70,lives:4,fish:4,haz:3,speed:115},normal:{time:60,lives:3,fish:5,haz:4,speed:145},hard:{time:55,lives:3,fish:6,haz:6,speed:174}},$=id=>document.getElementById(id),canvas=$('canvas'),ctx=canvas.getContext('2d'),score=$('score'),best=$('best'),time=$('time'),life=$('life'),combo=$('combo'),level=$('level'),power=$('power'),overlay=$('overlay'),title=$('title'),copy=$('copy'),history=$('history'),start=$('start'),pause=$('pause'),restart=$('restart'),sound=$('sound'),modeBtns=[...document.querySelectorAll('.mode')],pads=[...document.querySelectorAll('[data-dir]')];
let mode='normal',muted=false,audio=null,last=performance.now(),raf=0;const input={keys:new Set,target:null,pointer:false},state={phase:'ready',score:0,best:readBest(),combo:1,comboClock:0,level:1,lives:3,time:60,cat:null,fish:[],haz:[],yarn:null,particles:[],fishClock:0,yarnClock:8};
best.textContent=state.best;start.insertAdjacentHTML('afterend',`<a class='primary share off' id='share' href='#' target='_blank' rel='noopener noreferrer' aria-disabled='true' tabindex='-1'>Xでシェア</a>`);const share=$('share');selectMode(mode);resize();reset(false);requestAnimationFrame(loop);addEventListener('resize',resize);
start.onclick=()=>state.phase==='paused'?resume():reset(true);pause.onclick=()=>state.phase==='playing'?pauseGame():resume();restart.onclick=()=>reset(true);sound.onclick=()=>{muted=!muted;sound.style.opacity=muted?'.45':'1'};modeBtns.forEach(b=>b.onclick=()=>selectMode(b.dataset.mode));
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' '].includes(k))e.preventDefault();if(k===' '&&state.phase==='playing')return pauseGame();if(k===' '&&state.phase==='paused')return resume();input.keys.add(k);if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k))input.pointer=false});addEventListener('keyup',e=>input.keys.delete(e.key.toLowerCase()));
canvas.onpointerdown=e=>{canvas.setPointerCapture(e.pointerId);input.pointer=true;input.target=point(e);if(state.phase!=='playing')reset(true)};canvas.onpointermove=e=>{if(e.buttons||e.pointerType==='touch'){input.pointer=true;input.target=point(e)}};canvas.onpointerup=e=>input.target=point(e);
pads.forEach(btn=>{const key=`pad-${btn.dataset.dir}`,press=on=>{btn.classList.toggle('active',on);on?(input.keys.add(key),input.pointer=false):input.keys.delete(key)};btn.onpointerdown=e=>{e.preventDefault();btn.setPointerCapture(e.pointerId);if(state.phase!=='playing')reset(true);press(true)};btn.onpointerup=()=>press(false);btn.onpointercancel=()=>press(false);btn.onlostpointercapture=()=>press(false)});
function resize(){const r=canvas.getBoundingClientRect(),d=Math.max(1,Math.min(2.5,devicePixelRatio||1));canvas.width=Math.round(r.width*d);canvas.height=Math.round(r.height*d);draw()}function loop(now){const dt=Math.min(MAX,(now-last)/1000);last=now;state.phase==='playing'?update(dt):idle(dt);draw();raf=requestAnimationFrame(loop)}
function reset(play){const m=modes[mode];Object.assign(state,{phase:play?'playing':'ready',score:0,combo:1,comboClock:0,level:1,lives:m.lives,time:m.time,cat:{x:W/2,y:H/2,r:33,vx:0,vy:0,step:0,inv:0,power:0},fish:[],haz:[],yarn:null,particles:[],fishClock:0,yarnClock:7});input.target=null;input.pointer=false;pads.forEach(b=>{b.classList.remove('active');input.keys.delete(`pad-${b.dataset.dir}`)});history.hidden=true;history.textContent='';disableShare();for(let i=0;i<m.fish;i++)spawnFish(i===0?'gold':'fish');for(let i=0;i<m.haz;i++)spawnHaz(i);pause.disabled=!play;pause.setAttribute('aria-label','一時停止');overlay.classList.toggle('hide',play);title.textContent='ねこスナックラン';copy.textContent=`${m.time}秒チャレンジ`;start.textContent='スタート';hud();draw();if(play)beep(540,.07,'triangle',.03)}
function pauseGame(){state.phase='paused';pause.setAttribute('aria-label','再開');overlay.classList.remove('hide');title.textContent='一時停止';copy.textContent=`Score ${state.score}`;history.hidden=true;disableShare();start.textContent='再開'}function resume(){state.phase='playing';pause.setAttribute('aria-label','一時停止');overlay.classList.add('hide');last=performance.now()}function end(){if(state.phase==='ended')return;state.phase='ended';pause.disabled=true;const scores=saveScore(state.score);state.best=Math.max(state.best,scores[0]||0);writeBest(state.best);overlay.classList.remove('hide');title.textContent=state.lives>0?'まんぷく':'おひるね';copy.textContent=`Score ${state.score} / Best ${state.best}`;renderScores(scores);updateShareLink();start.textContent='もう一度';hud();beep(220,.12,'sawtooth',.025);setTimeout(()=>beep(330,.12,'triangle',.025),120)}
function selectMode(next){mode=modes[next]?next:'normal';modeBtns.forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));if(state.phase==='ready'){state.time=modes[mode].time;state.lives=modes[mode].lives;copy.textContent=`${state.time}秒チャレンジ`;hud()}}function update(dt){state.time-=dt;if(state.time<=0){state.time=0;return end()}state.level=Math.max(1,Math.floor(state.score/12)+1);state.comboClock=Math.max(0,state.comboClock-dt);if(!state.comboClock)state.combo=1;state.fishClock-=dt;state.yarnClock-=dt;state.cat.inv=Math.max(0,state.cat.inv-dt);state.cat.power=Math.max(0,state.cat.power-dt);moveCat(dt);updateFish(dt);updateHaz(dt);updateYarn(dt);updateParticles(dt);if(state.haz.length<Math.min(modes[mode].haz+Math.floor(state.level/2),10))spawnHaz(state.haz.length);hud()}function idle(dt){updateFish(dt*.35);updateHaz(dt*.25);updateYarn(dt*.35);updateParticles(dt)}
function moveCat(dt){const c=state.cat,b=c.power>0?1.35:1,s=(285+state.level*9)*b;let dx=0,dy=0;if(input.keys.has('arrowleft')||input.keys.has('a')||input.keys.has('pad-left'))dx--;if(input.keys.has('arrowright')||input.keys.has('d')||input.keys.has('pad-right'))dx++;if(input.keys.has('arrowup')||input.keys.has('w')||input.keys.has('pad-up'))dy--;if(input.keys.has('arrowdown')||input.keys.has('s')||input.keys.has('pad-down'))dy++;if(input.pointer&&input.target){const x=input.target.x-c.x,y=input.target.y-c.y,d=Math.hypot(x,y);if(d>4){dx=x/d;dy=y/d;const slow=Math.min(1,d/100);dx*=slow;dy*=slow}}else if(dx||dy){const d=Math.hypot(dx,dy);dx/=d;dy/=d}c.vx+=(dx*s-c.vx)*Math.min(1,dt*8);c.vy+=(dy*s-c.vy)*Math.min(1,dt*8);c.x=clamp(c.x+c.vx*dt,c.r+12,W-c.r-12);c.y=clamp(c.y+c.vy*dt,c.r+12,H-c.r-12);c.step+=(Math.abs(c.vx)+Math.abs(c.vy))*dt*.018;if(c.power>0&&Math.random()<dt*18)burst(c.x-Math.sign(c.vx||1)*28,c.y,'#f4bd4f',1)}
function updateFish(dt){for(let i=state.fish.length-1;i>=0;i--){const f=state.fish[i];f.w+=dt*f.ws;f.x+=Math.sin(f.w)*dt*10;f.y+=Math.cos(f.w*.7)*dt*8;if(dist(f,state.cat)<f.r+state.cat.r)collect(i)}if(state.fishClock<=0&&state.fish.length<modes[mode].fish+2){spawnFish(Math.random()<.14?'gold':'fish');state.fishClock=rand(.9,1.45)}}function collect(i){const f=state.fish[i],base=f.kind==='gold'?8:3;state.combo=Math.min(9,state.combo+1);state.comboClock=2.2;state.score+=base*state.combo;burst(f.x,f.y,f.kind==='gold'?'#f4bd4f':'#4d7fd1',f.kind==='gold'?18:12);state.fish.splice(i,1);spawnFish(Math.random()<.18?'gold':'fish');beep(f.kind==='gold'?820:660,.045,'sine',.025)}
function updateHaz(dt){const c=state.cat;for(const h of state.haz){const p=1+state.level*.035;h.x+=h.vx*dt*p;h.y+=h.vy*dt*p;h.spin+=dt*h.ss;if(h.x<h.r+8||h.x>W-h.r-8){h.vx*=-1;h.x=clamp(h.x,h.r+8,W-h.r-8)}if(h.y<h.r+8||h.y>H-h.r-8){h.vy*=-1;h.y=clamp(h.y,h.r+8,H-h.r-8)}if(c.inv<=0&&dist(h,c)<h.r+c.r*.76){state.lives--;state.combo=1;state.comboClock=0;c.inv=1.35;const a=Math.atan2(c.y-h.y,c.x-h.x);c.vx=Math.cos(a)*260;c.vy=Math.sin(a)*260;burst(c.x,c.y,'#f36f64',20);beep(170,.09,'square',.035);if(state.lives<=0){state.lives=0;end();return}}}}function updateYarn(dt){if(!state.yarn&&state.yarnClock<=0){const p=free(70);state.yarn={x:p.x,y:p.y,r:22,spin:0,life:7};state.yarnClock=rand(9,14)}if(!state.yarn)return;const y=state.yarn;y.spin+=dt*4;y.y+=Math.sin(y.spin)*dt*8;y.life-=dt;if(dist(y,state.cat)<y.r+state.cat.r){state.cat.power=5;state.score+=12;burst(y.x,y.y,'#74d4bf',26);state.yarn=null;beep(960,.08,'triangle',.03)}else if(y.life<=0)state.yarn=null}
function updateParticles(dt){for(let i=state.particles.length-1;i>=0;i--){const p=state.particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=90*dt;if(p.life<=0)state.particles.splice(i,1)}}function spawnFish(kind){const p=free(54);state.fish.push({kind,x:p.x,y:p.y,r:kind==='gold'?20:17,w:rand(0,Math.PI*2),ws:rand(2,4),flip:Math.random()<.5?-1:1})}function spawnHaz(i){const p=free(90),a=rand(0,Math.PI*2),s=modes[mode].speed+rand(-18,28)+i*2;state.haz.push({x:p.x,y:p.y,r:rand(21,28),vx:Math.cos(a)*s,vy:Math.sin(a)*s,spin:rand(0,Math.PI*2),ss:rand(-3,3),shade:Math.random()<.5?'#5fb06b':'#57a7c7'})}function free(m){for(let i=0;i<50;i++){const p={x:rand(m,W-m),y:rand(m,H-m)};if(dist(p,state.cat||{x:W/2,y:H/2})>160)return p}return{x:rand(m,W-m),y:rand(m,H-m)}}function burst(x,y,color,n){for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(60,190),life=rand(.32,.76);state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,color,size:rand(3,8)})}}
function draw(){ctx.save();ctx.setTransform(canvas.width/W,0,0,canvas.height/H,0,0);room();state.fish.forEach(drawFish);if(state.yarn)drawYarn(state.yarn);state.haz.forEach(drawHaz);drawParticles();drawCat(state.cat);if(state.phase==='paused'){ctx.globalAlpha=.18;ctx.fillStyle='#202532';ctx.fillRect(0,0,W,H)}ctx.restore()}function room(){const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#cce9bf');g.addColorStop(.5,'#a5ddc6');g.addColorStop(1,'#f3d4a5');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.globalAlpha=.17;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(let x=-120;x<W+120;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+210,H);ctx.stroke()}for(let y=60;y<H;y+=86){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y-68);ctx.stroke()}ctx.restore();ctx.save();ctx.globalAlpha=.16;ctx.fillStyle='#69527b';round(290,235,420,192,36);ctx.fill();ctx.restore()}
function drawFish(f){ctx.save();ctx.translate(f.x,f.y);ctx.scale(f.flip,1);ctx.rotate(Math.sin(f.w)*.12);ctx.fillStyle=f.kind==='gold'?'#f36f64':'#74d4bf';ctx.beginPath();ctx.moveTo(-f.r*.72,0);ctx.lineTo(-f.r*1.35,-f.r*.6);ctx.lineTo(-f.r*1.28,f.r*.62);ctx.closePath();ctx.fill();ctx.fillStyle=f.kind==='gold'?'#f4bd4f':'#4d7fd1';ctx.beginPath();ctx.ellipse(0,0,f.r*1.05,f.r*.65,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fffaf0';ctx.beginPath();ctx.arc(f.r*.45,-f.r*.16,f.r*.16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#202532';ctx.beginPath();ctx.arc(f.r*.49,-f.r*.16,f.r*.07,0,Math.PI*2);ctx.fill();ctx.restore()}function drawHaz(h){ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.spin);ctx.fillStyle='rgba(32,37,50,.13)';ctx.beginPath();ctx.ellipse(0,h.r+17,h.r*1.1,h.r*.36,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=h.shade==='#57a7c7'?'#57a7c7':'#5fb06b';h.shade==='#57a7c7'?(ctx.beginPath(),ctx.ellipse(0,0,h.r*1.14,h.r*.78,.3,0,Math.PI*2),ctx.fill()):(round(-h.r*1.15,-h.r*.48,h.r*2.3,h.r*.96,h.r*.46),ctx.fill());ctx.restore()}function drawYarn(y){ctx.save();ctx.translate(y.x,y.y);ctx.rotate(y.spin);ctx.fillStyle='#74d4bf';ctx.beginPath();ctx.arc(0,0,y.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(32,37,50,.27)';ctx.lineWidth=3;for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(0,0,y.r-4,5+i*2,i*Math.PI/4,0,Math.PI*2);ctx.stroke()}ctx.restore()}
function drawCat(c){if(!c)return;ctx.save();ctx.translate(c.x,c.y);ctx.scale(Math.abs(c.vx)>8?Math.sign(c.vx):1,1);if(c.inv>0&&Math.floor(c.inv*14)%2===0)ctx.globalAlpha=.55;ctx.fillStyle='rgba(32,37,50,.15)';ctx.beginPath();ctx.ellipse(0,38,43,13,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#f6c85f';ctx.lineWidth=16;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-34,2);ctx.bezierCurveTo(-66,-24,-72,28,-48,24);ctx.stroke();ctx.fillStyle='#fff2d6';ctx.beginPath();ctx.ellipse(0,10,41,31,.08,0,Math.PI*2);ctx.arc(20,-16,30,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f6c85f';ctx.beginPath();ctx.moveTo(4,-38);ctx.lineTo(14,-69);ctx.lineTo(28,-37);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(34,-35);ctx.lineTo(54,-60);ctx.lineTo(55,-25);ctx.closePath();ctx.fill();ctx.fillStyle='#d5965c';ctx.beginPath();ctx.ellipse(-12,4,14,22,-.85,0,Math.PI*2);ctx.ellipse(10,-24,11,16,-.45,0,Math.PI*2);ctx.fill();ctx.fillStyle='#202532';ctx.beginPath();ctx.arc(14,-18,3.3,0,Math.PI*2);ctx.arc(36,-17,3.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f36f64';ctx.beginPath();ctx.moveTo(25,-10);ctx.lineTo(30,-8);ctx.lineTo(25,-5);ctx.closePath();ctx.fill();ctx.strokeStyle='#202532';ctx.lineWidth=1.8;ctx.lineCap='round';for(const side of[-1,1]){ctx.beginPath();ctx.moveTo(25,-6);ctx.quadraticCurveTo(36,-5+side*5,49,-9+side*7);ctx.stroke()}const paw=Math.sin(c.step)*4;ctx.fillStyle='#fff2d6';ctx.beginPath();ctx.ellipse(-18,34+paw,10,8,0,0,Math.PI*2);ctx.ellipse(20,34-paw,10,8,0,0,Math.PI*2);ctx.fill();if(c.power>0){ctx.globalAlpha=.65;ctx.strokeStyle='#74d4bf';ctx.lineWidth=5;ctx.beginPath();ctx.arc(5,4,55+Math.sin(performance.now()/90)*4,0,Math.PI*2);ctx.stroke()}ctx.restore()}function drawParticles(){for(const p of state.particles){const a=Math.max(0,p.life/p.max);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();ctx.restore()}}
function hud(){score.textContent=state.score;best.textContent=state.best;time.textContent=Math.ceil(state.time);combo.textContent=`x${state.combo}`;level.textContent=state.level;life.setAttribute('aria-label',`ライフ ${state.lives}`);[...life.children].forEach((h,i)=>h.classList.toggle('off',i>=state.lives));power.style.width=`${Math.round((state.cat?.power||0)/5*100)}%`}function point(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function rand(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function round(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function readBest(){try{return Math.max(Number(localStorage.getItem(KB)||0),readScores()[0]||0)}catch{return 0}}function writeBest(v){try{localStorage.setItem(KB,String(v))}catch{}}function readScores(){try{const s=JSON.parse(localStorage.getItem(KS)||'[]');return Array.isArray(s)?s.map(Number).filter(n=>Number.isFinite(n)&&n>=0).sort((a,b)=>b-a).slice(0,5):[]}catch{return[]}}function saveScore(s){const scores=readScores();scores.push(Number(s)||0);const top=scores.sort((a,b)=>b-a).slice(0,5);try{localStorage.setItem(KS,JSON.stringify(top))}catch{}return top}function renderScores(scores){history.textContent='';scores.forEach((s,i)=>{const li=document.createElement('li'),rank=document.createElement('span'),val=document.createElement('strong');rank.textContent=i+1;val.textContent=s;li.append(rank,val);history.append(li)});history.hidden=!scores.length}
function disableShare(){share.href='#';share.classList.add('off');share.setAttribute('aria-disabled','true');share.setAttribute('tabindex','-1')}function updateShareLink(){const u=new URL(location.href);u.search='';u.hash='';const text=`ねこスナックランで ${state.score} 点！ Best ${state.best} 点\n#猫ソングスタジオ #ねこラン`;share.href=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(u.href)}`;share.classList.remove('off');share.setAttribute('aria-disabled','false');share.removeAttribute('tabindex')}
function beep(f,d,t,gain){if(muted)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type=t;o.frequency.value=f;g.gain.value=gain;g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch{muted=true;sound.style.opacity='.45'}}
addEventListener('beforeunload',()=>cancelAnimationFrame(raf));
})();
